# Run the prebuilt image published from GitHub Container Registry.
# Use docker-compose.build.yml if you want to build from local sources.
#
#   docker compose up -d
#   docker compose pull   # grab the latest published image

services:
  netskope-mcp:
    image: ghcr.io/johnneerdael/ns-private-access-mcp:${TAG:-latest}
    pull_policy: always
    container_name: netskope-mcp
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      # Canonical public origin (no trailing slash). Surfaced in /healthz
      # and the boot log; reserved for future OAuth metadata endpoints.
      PUBLIC_URL: ${PUBLIC_URL:-https://privateaccess.ntsk.app}
      # Optional fallback credentials if you want to run single-tenant
      # without requiring clients to send headers. Leave unset for
      # per-request auth (recommended for shared hosting).
      # NETSKOPE_BASE_URL: https://your-tenant.goskope.com
      # NETSKOPE_API_TOKEN: your-token
      # CORS_ORIGIN: https://claude.ai,https://chat.openai.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
