# Build the image from local sources. Use this when you're developing
# against this repo. For just running a published release, see
# docker-compose.yml (pulls from ghcr.io).
#
#   docker compose -f docker-compose.build.yml up --build
#   docker compose -f docker-compose.build.yml up -d   # detached, reuse last build

services:
  netskope-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: netskope-mcp:local
    container_name: netskope-mcp
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      # Optional fallback credentials if you want to run single-tenant
      # without requiring clients to send headers. Leave unset for
      # per-request auth (recommended for shared hosting).
      # NETSKOPE_BASE_URL: https://your-tenant.goskope.com
      # NETSKOPE_API_TOKEN: your-token
      # CORS_ORIGIN: https://claude.ai,https://chat.openai.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
